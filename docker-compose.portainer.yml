# ──────────────────────────────────────────────────────────────────────────────
# LSI Maintenance — Client Portal
# Stack Portainer avec nginx reverse-proxy + Let's Encrypt
#
# Variables à définir dans Portainer → Stacks → Env :
#   Obligatoires : POSTGRES_PASSWORD, NEXTAUTH_SECRET, ENCRYPTION_KEY,
#                  CRON_SECRET, DOMAIN, LETSENCRYPT_EMAIL
#   Optionnelles : DESK365_*, WASABI_*, COMET_*, AXONAUT_API_KEY, MAILGUN_*, DOCUSEAL_*
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lsi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: lsi_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsi"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lsi_net

  # ── Application Next.js ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Base de données
      DATABASE_URL: postgresql://lsi:${POSTGRES_PASSWORD}@postgres:5432/lsi_portal?schema=public
      # Auth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?}
      NEXTAUTH_URL: https://${DOMAIN:-localhost}
      # Chiffrement
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}
      # Cron
      CRON_SECRET: ${CRON_SECRET:?}
      # Email (Mailgun)
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_FROM: ${MAILGUN_FROM:-}
      LSI_NOTIFY_EMAIL: ${LSI_NOTIFY_EMAIL:-contact@lsi-maintenance.fr}
      # Desk365 (ticketing)
      DESK365_SUBDOMAIN: ${DESK365_SUBDOMAIN:-}
      DESK365_API_KEY: ${DESK365_API_KEY:-}
      # Wasabi (stockage S3)
      WASABI_ACCESS_KEY: ${WASABI_ACCESS_KEY:-}
      WASABI_SECRET_KEY: ${WASABI_SECRET_KEY:-}
      # Comet Backup (monitoring sauvegardes)
      COMET_SERVER_URL: ${COMET_SERVER_URL:-}
      COMET_ADMIN_USER: ${COMET_ADMIN_USER:-}
      COMET_ADMIN_PASS: ${COMET_ADMIN_PASS:-}
      # Axonaut (CRM)
      AXONAUT_API_KEY: ${AXONAUT_API_KEY:-}
      # DocuSeal (signature électronique)
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-https://api.docuseal.eu}
      # Tactical RMM (supervision)
      RMM_BASE_URL: ${RMM_BASE_URL:-}
      RMM_API_KEY: ${RMM_API_KEY:-}
    volumes:
      - uploads:/app/public/uploads
      - handovers:/app/public/handovers
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/csrf"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lsi_net

  # ── Tâches planifiées ─────────────────────────────────────────────────────────
  cron:
    image: alpine:3.21
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://app:3000
    entrypoint:
      - sh
      - -c
      - |
        printf '%s\n' \
          "*/15 * * * * wget -qO- $$APP_URL/api/cron/check-movements?secret=$$CRON_SECRET >> /var/log/cron.log 2>&1" \
          "0 2,14 * * * wget -qO- $$APP_URL/api/cron/sync-m365?secret=$$CRON_SECRET >> /var/log/cron.log 2>&1" \
          | crontab - && crond -f -d 8
    depends_on:
      - app
    networks:
      - lsi_net

  # ── Nginx reverse-proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN requis}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - lsi_net

  # ── Certbot Let's Encrypt ─────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  uploads:
  handovers:
  certbot_www:
    external: true
    name: lsi_certbot_www
  certbot_conf:
    external: true
    name: lsi_certbot_conf

networks:
  lsi_net:
    driver: bridge
