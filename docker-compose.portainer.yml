# ──────────────────────────────────────────────────────────────────────────────
# LSI Maintenance — Client Portal
# Stack Portainer avec nginx reverse-proxy + Let's Encrypt
#
# Variables d'environnement à définir dans Portainer → Stacks → Env :
#   POSTGRES_PASSWORD, NEXTAUTH_SECRET, NEXTAUTH_URL, ENCRYPTION_KEY,
#   DOMAIN (ex: thor.lsi-maintenance.fr), LETSENCRYPT_EMAIL
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lsi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: lsi_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsi"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lsi_net

  # ── Application Next.js ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lsi:${POSTGRES_PASSWORD}@postgres:5432/lsi_portal?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?}
      NEXTAUTH_URL: https://${DOMAIN:-localhost}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lsi_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/csrf"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx reverse-proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - lsi_net

  # ── Certbot Let's Encrypt ─────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  uploads:
  certbot_www:
  certbot_conf:

networks:
  lsi_net:
    driver: bridge
