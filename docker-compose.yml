services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lsi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:-lsi_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lsi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lsi_net

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lsi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lsi_portal}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET requis}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY requis}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_FROM: ${MAILGUN_FROM:-}
      LSI_NOTIFY_EMAIL: ${LSI_NOTIFY_EMAIL:-contact@lsi-maintenance.fr}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET requis}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lsi_net

  cron:
    image: alpine:3.21
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://app:3000
    # Appel toutes les 15 minutes
    entrypoint: >
      sh -c "echo '*/15 * * * * wget -qO- \"$$APP_URL/api/cron/check-movements?secret=$$CRON_SECRET\" && echo' | crontab - && crond -f -d 8"
    depends_on:
      - app
    networks:
      - lsi_net

volumes:
  postgres_data:
  uploads:

networks:
  lsi_net:
    driver: bridge
